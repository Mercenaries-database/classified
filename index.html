<!DOCTYPE html>
<html>
<head>
    <title>Терминал ОСОЗНАНИЕ</title>
  <style>
    body { 
        background-color: #0b0e14;
        /* Фоновая сетка как на тактической карте */
        background-image: 
            linear-gradient(rgba(44, 100, 204, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(44, 100, 204, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
        color: #78d1ff;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0;
        overflow: hidden;
    }

    #login-form, #database-content { 
        border-top: 4px solid #2c64cc; /* Синяя полоса Синдиката */
        background: rgba(15, 20, 28, 0.95);
        padding: 40px; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(44, 100, 204, 0.2);
        max-width: 700px;
        width: 90%;
        position: relative;
    }

    /* Декоративный уголок */
    #login-form::before {
        content: "MERCENARY NET v4.2";
        position: absolute;
        top: -25px;
        left: 0;
        font-size: 10px;
        color: #2c64cc;
        letter-spacing: 2px;
    }

    h1, h2 { 
        text-transform: uppercase; 
        letter-spacing: 3px; 
        color: #ffffff;
        border-left: 5px solid #2c64cc;
        padding-left: 15px;
    }

    input { 
        background: #161b22; 
        border: 1px solid #2c64cc; 
        color: #fff; 
        padding: 15px; 
        margin: 10px 0; 
        width: 100%; 
        box-sizing: border-box;
        transition: 0.3s;
    }

    input:focus {
        border-color: #78d1ff;
        box-shadow: 0 0 10px rgba(120, 209, 255, 0.3);
        outline: none;
    }

    button { 
        background: #2c64cc; 
        color: white; 
        border: none; 
        padding: 15px; 
        cursor: pointer; 
        font-weight: bold; 
        width: 100%; 
        transition: 0.3s;
        text-transform: uppercase;
    }

    button:hover { 
        background: #3d7eeb;
        letter-spacing: 5px;
    }

    .card { 
        border-left: 3px solid #2c64cc;
        background: rgba(44, 100, 204, 0.05);
        padding: 20px; 
        margin-top: 20px;
        transition: 0.2s;
    }

    .card:hover {
        background: rgba(44, 100, 204, 0.1);
        transform: translateX(10px);
    }

    .status-alive { color: #00ff00; }
    .status-dead { color: #ff4444; }
</style>

</head>
<body>

    <!-- ОКНО ВХОДА -->
    <div id="login-form">
        <h2 style="text-align: center;">ВВЕДИТЕ УЧЕТНЫЕ ДАННЫЕ</h2>
        <input type="text" id="username" placeholder="ЛОГИН">
        <input type="password" id="password" placeholder="ПАРОЛЬ">
        <button onclick="login()">АВТОРИЗАЦИЯ</button>
        <p id="error" style="color: red; display: none;">ДОСТУП ЗАПРЕЩЕН</p>
    </div>

    <!-- ОКНО С БАЗОЙ (скрыто по умолчанию) -->
    <div id="database-content" class="hidden">
        <h1>РЕЕСТР ПЕРСОНАЖЕЙ ЧЗО</h1>
        <div id="output"></div>
        <br>
        <button onclick="location.reload()">ВЫХОД</button>
    </div>

    <script>
        // Твои логины и пароли (для RP этого достаточно)
        const USERS = {
            "admin": "pda2024",
            "sidorovich": "habar"
        };

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (USERS[user] && USERS[user] === pass) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('database-content').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function loadData() {
            fetch('database.json')
                .then(response => response.json())
                .then(data => {
                    let html = '';
                    data.forEach(item => {
                        html += `
                            <div class="card">
                                <h3>${item.name} [${item.faction}]</h3>
                                <p><b>Статус:</b> ${item.status}</p>
                                <p>${item.description}</p>
                            </div>
                        `;
                    });
                    document.getElementById('output').innerHTML = html;
                });
        }
    </script>
</body>
</html>
