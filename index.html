<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MERCENARY NETWORK</title>
    <style>
        body { 
            background-color: #0b0e14;
            margin: 0;
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif;
            color: #78d1ff;
            overflow: hidden;
        }

        /* ГАРАНТИРОВАННЫЙ ФОН */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            /* Сетка */
            background-image: 
                linear-gradient(rgba(44, 100, 204, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(44, 100, 204, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ЛОГОТИП НА ФОНЕ */
        .bg-logo {
            width: 80vh;
            height: 80vh;
            /* Используем альтернативную ссылку на логотип */
            background: url('https://wikimedia.org') no-repeat center;
            background-size: contain;
            opacity: 0.15; /* Если не видно, поставь 0.5 */
            filter: blue;
            animation: pulse 5s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.05); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.1; }
        }

        #login-form, #database-content { 
            position: relative;
            z-index: 10;
            background: rgba(10, 15, 25, 0.95);
            border: 1px solid #2c64cc;
            border-top: 4px solid #2c64cc;
            padding: 40px; 
            box-shadow: 0 0 50px #000;
            width: 350px;
            backdrop-filter: blur(10px);
        }

        .hidden { display: none !important; }

        input { 
            background: #000; border: 1px solid #2c64cc; color: #fff; 
            padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; 
        }

        button { 
            background: #2c64cc; color: #fff; border: none; padding: 12px; 
            width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        .card { border-left: 3px solid #2c64cc; background: rgba(44, 100, 204, 0.1); padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="bg-logo"></div>
    </div>

    <div id="login-form">
        <h2 style="text-align:center">MERC NETWORK</h2>
        <input type="text" id="username" placeholder="ID">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="login()">LOGIN</button>
        <p id="error" style="color:red; display:none; text-align:center;">ERROR</p>
    </div>

    <div id="database-content" class="hidden">
        <h2>DATABASE</h2>
        <div id="output"></div>
        <button onclick="location.reload()" style="margin-top:20px">EXIT</button>
    </div>

    <script>
        const USERS = { "admin": "pda2024" };
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (USERS[u] && USERS[u] === p) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('database-content').classList.remove('hidden');
                loadData();
            } else { document.getElementById('error').style.display = 'block'; }
        }
        function loadData() {
            fetch('database.json').then(r => r.json()).then(data => {
                let html = '';
                data.forEach(item => {
                    html += `<div class="card"><h3>${item.name}</h3><p>${item.faction}</p></div>`;
                });
                document.getElementById('output').innerHTML = html;
            });
        }
    </script>
</body>
</html>
