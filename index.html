<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MERCENARY NETWORK | DATABASE</title>
    <style>
        /* ОСНОВНОЙ СТИЛЬ */
        body { 
            background-color: #0b0e14;
            /* Фоновая тактическая сетка */
            background-image: 
                linear-gradient(rgba(44, 100, 204, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(44, 100, 204, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #78d1ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        /* ЭФФЕКТ СКАНИРОВАНИЯ (ЛИНии КИНЕСКОПА) */
        body::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        /* КОНТЕЙНЕРЫ */
        #login-form, #database-content { 
            border-top: 4px solid #2c64cc;
            background: rgba(15, 20, 28, 0.95);
            padding: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(44, 100, 204, 0.2);
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 5;
        }

        .hidden { display: none !important; }

        /* ЛОГОТИП */
        .mrc-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background-image: url('https://nocookie.net');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 10px rgba(44, 100, 204, 0.6));
        }

        h2 { 
            text-align: center;
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #ffffff;
            margin-bottom: 25px;
        }

        /* ПОЛЯ ВВОДА */
        input { 
            background: #161b22; 
            border: 1px solid #2c64cc; 
            color: #fff; 
            padding: 15px; 
            margin: 10px 0; 
            width: 100%; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #78d1ff;
            background: #1c232b;
        }

        /* КНОПКА */
        button { 
            background: #2c64cc; 
            color: white; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        button:hover { 
            background: #3d7eeb;
            letter-spacing: 4px;
        }

        /* КАРТОЧКИ ПЕРСОНАЖЕЙ */
        .card { 
            border-left: 3px solid #2c64cc;
            background: rgba(44, 100, 204, 0.05);
            padding: 15px; 
            margin-top: 15px;
            transition: 0.2s;
        }

        .card:hover {
            background: rgba(44, 100, 204, 0.15);
            transform: translateX(5px);
        }

        .card h3 { margin: 0 0 5px 0; color: #fff; }
        .card p { margin: 5px 0; font-size: 14px; }

        #output {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Скроллбар в стиле наемников */
        #output::-webkit-scrollbar { width: 5px; }
        #output::-webkit-scrollbar-track { background: #0b0e14; }
        #output::-webkit-scrollbar-thumb { background: #2c64cc; }

    </style>
</head>
<body>

    <!-- ОКНО ВХОДА -->
    <div id="login-form">
        <div class="mrc-logo"></div>
        <h2>IDENTIFICATION REQUIRED</h2>
        <input type="text" id="username" placeholder="OPERATIVE ID">
        <input type="password" id="password" placeholder="ACCESS CODE">
        <button onclick="login()">ESTABLISH CONNECTION</button>
        <p id="error" style="color: #ff4444; display: none; text-align: center; margin-top: 15px;">ACCESS DENIED. TRACING IP...</p>
    </div>

    <!-- БАЗА ДАННЫХ -->
    <div id="database-content" class="hidden">
        <h2>MERCENARY DATABASE v4.2</h2>
        <div id="output"></div>
        <br>
        <button onclick="location.reload()" style="background: #161b22; border: 1px solid #2c64cc;">LOGOUT</button>
    </div>

    <script>
        // Твои логины и пароли
        const USERS = {
            "admin": "pda2024",
            "merc": "sindikat"
        };

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (USERS[user] && USERS[user] === pass) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('database-content').classList.remove('hidden');
                loadData();
            } else {
                const err = document.getElementById('error');
                err.style.display = 'block';
                // Тряска окна при ошибке
                const form = document.getElementById('login-form');
                form.style.transform = 'translateX(10px)';
                setTimeout(() => form.style.transform = 'translateX(-10px)', 50);
                setTimeout(() => form.style.transform = 'translateX(0)', 100);
            }
        }

        function loadData() {
            // Файл database.json должен лежать в той же папке на GitHub
            fetch('database.json')
                .then(response => response.json())
                .then(data => {
                    let html = '';
                    data.forEach(item => {
                        html += `
                            <div class="card">
                                <h3>${item.name}</h3>
                                <p><b>ГРУППИРОВКА:</b> ${item.faction}</p>
                                <p><b>СТАТУС:</b> ${item.status}</p>
                                <p><b>ИНФО:</b> ${item.description}</p>
                            </div>
                        `;
                    });
                    document.getElementById('output').innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('output').innerHTML = "ОШИБКА ДОСТУПА К ФАЙЛУ ДАННЫХ.";
                });
        }
    </script>
</body>
</html>
